name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP2-main/Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TP2-main/Frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  test-backend:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP2-main/Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TP2-main/Backend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: TP2-main/Backend/coverage/

  test-frontend:
    name: Frontend Tests + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP2-main/Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TP2-main/Frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: TP2-main/Frontend/coverage/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit Backend
        working-directory: TP2-main/Backend
        run: npm audit --audit-level=high || true
      - name: Audit Frontend
        working-directory: TP2-main/Frontend
        run: npm audit --audit-level=high || true

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    defaults:
      run:
        working-directory: TP2-main/Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TP2-main/Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: TP2-main/Frontend/dist/
