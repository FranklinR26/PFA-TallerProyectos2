# Orquestación full-stack para desarrollo y producción.
services:
  tp2-mongo:
    image: mongo:7
    container_name: tp2-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tp2-backend:
    build:
      context: ./Backend
    container_name: tp2-backend
    restart: unless-stopped
    depends_on:
      tp2-mongo:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://tp2-mongo:27017/tp2
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CLIENT_URL: http://localhost:5173
      GREEN_HOSTING: "false"
    ports:
      - "5000:5000"
    networks:
      - app-network

  tp2-frontend:
    build:
      context: ./Frontend
    container_name: tp2-frontend
    restart: unless-stopped
    depends_on:
      - tp2-backend
    ports:
      - "80:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
