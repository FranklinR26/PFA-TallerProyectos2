# Orquestación full-stack para desarrollo y para el análisis de GreenFrame.
# Los nombres de contenedor coinciden con .greenframe.yml.
services:
  tp2-mongo:
    image: mongo:7
    container_name: tp2-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  tp2-backend:
    build:
      context: ./Backend
    container_name: tp2-backend
    restart: unless-stopped
    depends_on:
      - tp2-mongo
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://tp2-mongo:27017/tp2
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CLIENT_URL: http://localhost:5173
      GREEN_HOSTING: "false"
    ports:
      - "5000:5000"

  tp2-frontend:
    build:
      context: ./Frontend
    container_name: tp2-frontend
    restart: unless-stopped
    depends_on:
      - tp2-backend
    ports:
      - "5173:5173"

volumes:
  mongo-data:
